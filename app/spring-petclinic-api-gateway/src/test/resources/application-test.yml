spring:
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
    gateway:
      server:
        webflux:
          routes:
            - id: customers-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/customer/**
            - id: vets-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/vet/**
            - id: visits-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/visit/**
            - id: genai-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/genai/**

eureka:
  client:
    enabled: false
