name: e2e-smoke

on:
  workflow_run:
    workflows: ["infra-bootstrap"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux, aws-vpc]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Configure kubeconfig
        run: |
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          mkdir -p "$(dirname "$KUBECONFIG")"
          echo "KUBECONFIG=$KUBECONFIG" >> "$GITHUB_ENV"
          aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "${{ secrets.AWS_REGION }}" --kubeconfig "$KUBECONFIG"

      - name: Wait for ingress hostname
        run: |
          for i in {1..60}; do
            ALB=$(kubectl -n petclinic get ingress frontend-proxyr -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$ALB" ]; then
              echo "ALB=$ALB" >> $GITHUB_ENV
              break
            fi
            sleep 10
          done
          test -n "${ALB}"

      - name: Smoke API checks
        run: |
          curl -fsS "http://${ALB}/api/customer/owners" >/dev/null
          curl -fsS "http://${ALB}/api/vet/vets" >/dev/null
          curl -fsS "http://${ALB}/api/visit/owners/1/pets/1/visits" >/dev/null
