# .github/workflows/ci.yaml
name: api-gateway-ci

on:
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"
      - "kubernetes/api-gateway/**"
      - "terraform/**"
      - ".github/workflows/ci.yaml"
  push:
    branches: [ main, githubcicheck ]
    paths:
      - "app/**"
      - "kubernetes/api-gateway/**"
      - "terraform/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write

env:
  SERVICE_NAME: api-gateway
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/api-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build (skip tests)
        run: |
          cd app
          if [ -f "./mvnw" ]; then MVN="./mvnw"; else MVN="mvn"; fi
          $MVN -pl spring-petclinic-api-gateway -am clean package -DskipTests

      - name: Unit tests
        run: |
          cd app
          if [ -f "./mvnw" ]; then MVN="./mvnw"; else MVN="mvn"; fi
          $MVN -pl spring-petclinic-api-gateway -am test

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven


      - name: SonarQube/SonarCloud Static Code Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          cd app
          ./mvnw -pl spring-petclinic-api-gateway -am verify sonar:sonar \
            -Dsonar.coverage.jacoco.xmlReportPaths=spring-petclinic-api-gateway/target/site/jacoco/jacoco.xml \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.organization="$SONAR_ORG" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.qualitygate.wait=true

  security-scan:
    runs-on: ubuntu-latest
    needs: [build, code-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy FS scan (app source)
        uses: aquasecurity/trivy-action@v0.25.0
        with:
          scan-type: fs
          scan-ref: app/
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Trivy config scan (Kubernetes)
        uses: aquasecurity/trivy-action@v0.25.0
        with:
          scan-type: config
          scan-ref: kubernetes/api-gateway
          severity: HIGH,CRITICAL
          format: table
          exit-code: '1'

      - name: Trivy config scan (Terraform)
        uses: aquasecurity/trivy-action@v0.25.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          format: table
          exit-code: '1'


  docker:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/spring-petclinic-api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.run_id }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.25.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.run_id }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'


  updatek8s:
    runs-on: ubuntu-latest
    needs: [build, docker, code-quality]
    # Update the manifest on the PR branch so it can be reviewed/merged to main.
    if: needs.docker.result == 'success' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Update image tag in k8s deployment manifest
        run: |
          FILE="kubernetes/api-gateway/deploy.yaml"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found."
            exit 1
          fi
          sed -i "s|image: .*api-gateway:.*|image: ${{ env.DOCKER_IMAGE }}:${{ github.run_id }}|g" "$FILE"

      - name: Commit and push changes
        run: |
          git config --global user.email "teju.654@gmail.com"
          git config --global user.name "tejupagudala"
          git add kubernetes/api-gateway/deploy.yaml
          git commit -m "[CI]: Update api-gateway image tag to ${{ github.run_id }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref }}
