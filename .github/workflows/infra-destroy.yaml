name: infra-destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to continue"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: github.event.inputs.confirm == 'DESTROY'
    runs-on: [self-hosted, linux, aws-vpc]
    env:
      TF_VAR_github_org: ${{ vars.REPO_ORG }}
      TF_VAR_github_repo: ${{ vars.REPO_NAME }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
      TF_VAR_enable_cost_anomaly_detection: "false"
      TF_VAR_existing_anomaly_monitor_arn: ""
      CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_INFRA }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Destroy infrastructure
        run: |
          terraform -chdir=terraform init -input=false
          terraform -chdir=terraform destroy -auto-approve -input=false
      - name: Verify teardown
        run: |
          set -euo pipefail
          CLUSTER_NAME="${CLUSTER_NAME:-demo-eks-cluster}"
          EXIT=0

          if aws eks describe-cluster --name "$CLUSTER_NAME" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
            echo "EKS cluster still exists: $CLUSTER_NAME"
            EXIT=1
          fi

          RUNNER_IDS=$(aws ec2 describe-instances \
            --filters Name=tag:Name,Values="${CLUSTER_NAME}-github-runner" Name=instance-state-name,Values=pending,running,stopping,stopped \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [ -n "$RUNNER_IDS" ]; then
            echo "Runner instances still exist: $RUNNER_IDS"
            EXIT=1
          fi

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=tag:Name,Values="${CLUSTER_NAME}-vpc" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Vpcs[0].VpcId" --output text)
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "VPC still exists: $VPC_ID"
            EXIT=1

            NATS=$(aws ec2 describe-nat-gateways \
              --filter Name=vpc-id,Values="$VPC_ID" Name=state,Values=available,pending,deleting \
              --region "${{ secrets.AWS_REGION }}" \
              --query "NatGateways[].NatGatewayId" --output text)
            if [ -n "$NATS" ]; then
              echo "NAT gateways still exist: $NATS"
              EXIT=1
            fi

            LBS=$(aws elbv2 describe-load-balancers \
              --region "${{ secrets.AWS_REGION }}" \
              --query "LoadBalancers[?VpcId=='$VPC_ID'].LoadBalancerArn" --output text)
            if [ -n "$LBS" ]; then
              echo "ALBs/NLBs still exist in VPC: $LBS"
              EXIT=1
            fi
          fi

          EIPS=$(aws ec2 describe-addresses \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Addresses[?Tags!=null && contains(join(',', Tags[].Value), '${CLUSTER_NAME}')].[AllocationId,PublicIp]" --output text)
          if [ -n "$EIPS" ]; then
            echo "Tagged EIPs still exist: $EIPS"
            EXIT=1
          fi

          VOLS=$(aws ec2 describe-volumes \
            --region "${{ secrets.AWS_REGION }}" \
            --filters Name=status,Values=available \
            --query "Volumes[?Tags!=null && contains(join(',', Tags[].Value), '${CLUSTER_NAME}')].[VolumeId,Size]" --output text)
          if [ -n "$VOLS" ]; then
            echo "Detached EBS volumes still exist: $VOLS"
            EXIT=1
          fi

          SNAPSHOTS=$(aws ec2 describe-snapshots \
            --owner-ids self \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Snapshots[?Tags!=null && contains(join(',', Tags[].Value), '${CLUSTER_NAME}')].[SnapshotId,VolumeId]" --output text)
          if [ -n "$SNAPSHOTS" ]; then
            echo "EBS snapshots still exist: $SNAPSHOTS"
            EXIT=1
          fi

          if [ "$EXIT" -ne 0 ]; then
            echo "Teardown verification failed."
            exit 1
          fi
          echo "Teardown verified: no cluster, runner, VPC, NAT, or tagged EIPs."

  stop-runner:
    if: always() && needs.destroy.result != 'skipped'
    needs: [destroy]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_INFRA }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Stop self-hosted runner EC2
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ vars.RUNNER_INSTANCE_ID }}"
          if [ -z "$INSTANCE_ID" ]; then
            echo "RUNNER_INSTANCE_ID is not set; skipping runner stop."
            exit 0
          fi

          if ! aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
            echo "Runner instance $INSTANCE_ID does not exist; skipping stop."
            exit 0
          fi

          STATE=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "stopping" ]; then
            echo "Runner instance $INSTANCE_ID is already $STATE; nothing to do."
            exit 0
          fi

          aws ec2 stop-instances \
            --instance-ids "$INSTANCE_ID" \
            --region "${{ secrets.AWS_REGION }}"
