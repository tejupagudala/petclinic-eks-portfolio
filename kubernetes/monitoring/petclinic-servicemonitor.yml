apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-gateway-sm
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames: ["petclinic"]
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  jobLabel: app.kubernetes.io/name
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
---
