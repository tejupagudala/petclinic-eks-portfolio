apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vets-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tejupagudala/petclinic-eks-portfolio.git
    targetRevision: main
    path: kubernetes/vets-service
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
