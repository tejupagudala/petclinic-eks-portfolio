apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
  namespace: petclinic
  labels:
    app.kubernetes.io/name: customers-service
    app.kubernetes.io/part-of: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: customers-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customers-service
        app.kubernetes.io/part-of: petclinic
    spec:
      volumes:
        - name: app-config
          configMap:
            name: customers-service-config
      initContainers:
        - name: wait-for-rds
          image: busybox:1.36
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: host
          command:
            - sh
            - -c
            - |
              until nc -z "$DB_HOST" 3306; do
                echo "waiting for rds:3306..."
                sleep 2
              done


             
      containers:
        - name: customers-service
          image: tejupagudala/customers-service:v3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: optional:file:/config/
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            - name: SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED
              value: "false"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: url
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: host

          volumeMounts:
            - name: app-config
              mountPath: /config/application.yml
              subPath: application.yml

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              memory: "512Mi"
 
      
